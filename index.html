<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajit GATE EE Pro</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #38bdf8;
            --text: #f1f5f9;
            --success: #22c55e;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }
        .header {
            text-align: center;
            padding: 20px;
            border-bottom: 2px solid var(--accent);
            margin-bottom: 20px;
        }
        .branding {
            font-size: 24px;
            font-weight: bold;
            color: var(--accent);
        }
        .section {
            background: var(--card);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }
        h2 { color: var(--accent); border-left: 4px solid var(--accent); padding-left: 10px; }
        .goal-input {
            width: 80%;
            padding: 10px;
            border-radius: 5px;
            border: none;
        }
        .btn {
            background: var(--accent);
            color: var(--bg);
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }
        .mock-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        .mock-table th, .mock-table td {
            padding: 10px;
            border: 1px solid #334155;
            text-align: center;
        }
        .subject-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .subject-item {
            background: #334155;
            padding: 10px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="branding">AJIT GATE EE PRO 2026</div>
        <p>Precision Tracking for Excellence</p>
    </div>

    <div class="section">
        <h2>Daily Goals</h2>
        <div style="display:flex; gap:10px;">
            <input type="text" id="goalInput" class="goal-input" placeholder="Enter today's task...">
            <button class="btn" onclick="addGoal()">Add</button>
        </div>
        <ul id="goalList" style="list-style:none; padding:10px 0;"></ul>
    </div>

    <div class="section">
        <h2>Syllabus Progress</h2>
        <div class="subject-grid">
            <div class="subject-item"><span>Electric Circuits</span> <input type="checkbox"></div>
            <div class="subject-item"><span>Signals & Systems</span> <input type="checkbox"></div>
            <div class="subject-item"><span>Electrical Machines</span> <input type="checkbox"></div>
            <div class="subject-item"><span>Power Systems</span> <input type="checkbox"></div>
            <div class="subject-item"><span>Control Systems</span> <input type="checkbox"></div>
            <div class="subject-item"><span>Digital Electronics</span> <input type="checkbox"></div>
        </div>
    </div>

    <div class="section">
        <h2>Mock Test Tracker</h2>
        <table class="mock-table">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Test Name</th>
                    <th>Marks</th>
                </tr>
            </thead>
            <tbody id="mockBody">
                </tbody>
        </table>
        <div style="margin-top:10px; display:flex; gap:5px;">
            <input type="text" id="mockName" placeholder="Test Name" style="width:40%">
            <input type="number" id="mockScore" placeholder="Score" style="width:20%">
            <button class="btn" onclick="addMock()">Log</button>
        </div>
    </div>

    <script>
        function addGoal() {
            const val = document.getElementById('goalInput').value;
            if(!val) return;
            const li = document.createElement('li');
            li.innerHTML = `<input type="checkbox"> ${val}`;
            li.style.padding = "5px 0";
            document.getElementById('goalList').appendChild(li);
            document.getElementById('goalInput').value = "";
        }

        function addMock() {
            const name = document.getElementById('mockName').value;
            const score = document.getElementById('mockScore').value;
            if(!name || !score) return;
            const row = `<tr><td>${new Date().toLocaleDateString()}</td><td>${name}</td><td>${score}</td></tr>`;
            document.getElementById('mockBody').innerHTML += row;
            document.getElementById('mockName').value = "";
            document.getElementById('mockScore').value = "";
        }
    </script>
</body>
</html>
