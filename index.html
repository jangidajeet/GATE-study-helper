<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GATE EE Tracker - Ajeet</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --text-color: #c9d1d9;
            --accent-color: #58a6ff;
            --border-color: #30363d;
            --success: #238636;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        /* Ajeet Branding Watermarks */
        .watermark {
            position: fixed;
            font-weight: 900;
            font-size: 1.5rem;
            color: rgba(255, 255, 255, 0.05);
            z-index: 1000;
            pointer-events: none;
            text-transform: uppercase;
        }
        .top-left { top: 10px; left: 10px; }
        .top-right { top: 10px; right: 10px; }
        .bottom-left { bottom: 10px; left: 10px; }
        .bottom-right { bottom: 10px; right: 10px; }

        .container { max-width: 1000px; margin: 0 auto; }

        h1, h2 { color: var(--accent-color); text-align: center; }

        .quote-box {
            background: var(--card-bg);
            border-left: 5px solid var(--accent-color);
            padding: 15px;
            margin-bottom: 25px;
            font-style: italic;
            text-align: center;
        }

        /* Analytics Section */
        .analytics-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        /* Syllabus Grid */
        .subjects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 15px;
        }

        .subject-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
        }

        .subject-card h3 { margin-top: 0; border-bottom: 1px solid var(--border-color); padding-bottom: 5px; }

        .task-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 8px 0;
        }

        /* Mock Test Section */
        .mock-section {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 8px;
            margin-top: 30px;
        }

        .input-group { margin: 10px 0; }
        input, select, button {
            padding: 10px;
            background: #0d1117;
            border: 1px solid var(--border-color);
            color: white;
            border-radius: 4px;
        }

        button {
            background: var(--success);
            cursor: pointer;
            font-weight: bold;
        }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid var(--border-color); padding: 10px; text-align: center; }
    </style>
</head>
<body>

    <div class="watermark top-left">AJEET</div>
    <div class="watermark top-right">AJEET</div>
    <div class="watermark bottom-left">AJEET</div>
    <div class="watermark bottom-right">AJEET</div>

    <div class="container">
        <h1>⚡ GATE EE COMMAND CENTER</h1>
        
        <div class="quote-box" id="quote">"Control the input, dominate the output."</div>

        <div class="analytics-grid">
            <div class="subject-card">
                <h3>Overall Progress</h3>
                <canvas id="progressChart"></canvas>
            </div>
            <div class="subject-card">
                <h3>Mock Performance</h3>
                <canvas id="mockChart"></canvas>
            </div>
        </div>

        <h2>📚 Syllabus Tracker</h2>
        <div class="subjects-grid" id="syllabus-container">
            </div>

        <div class="mock-section">
            <h2>📝 Log Mock Test</h2>
            <div class="input-group">
                <input type="text" id="mockName" placeholder="Test Name (e.g. Full Test 1)">
                <input type="number" id="mockScore" placeholder="Score / 100" max="100">
                <button onclick="addMock()">Log Score</button>
            </div>
            <table id="mockTable">
                <thead>
                    <tr><th>Test</th><th>Score</th></tr>
                </thead>
                <tbody id="mockBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        const subjects = [
            "Network Analysis", "Analog Network", "Digital Network", 
            "Power System", "Power Electronics", "Control System", 
            "Electrical Machines", "Measurement & Instrumentation", 
            "Electromagnetic Theory", "Engineering Mathematics", 
            "General Aptitude", "Signal and System"
        ];

        const taskTypes = ["Notes", "DPP", "PYQs", "Revision"];
        
        // Load Data from Local Storage
        let trackerData = JSON.parse(localStorage.getItem('gate_ee_data')) || {};
        let mockData = JSON.parse(localStorage.getItem('gate_mock_data')) || [];

        const container = document.getElementById('syllabus-container');

        // Build Syllabus UI
        subjects.forEach(sub => {
            const card = document.createElement('div');
            card.className = 'subject-card';
            card.innerHTML = `<h3>${sub}</h3>`;
            
            taskTypes.forEach(task => {
                const key = `${sub}-${task}`;
                const checked = trackerData[key] ? 'checked' : '';
                card.innerHTML += `
                    <div class="task-row">
                        <label>${task}</label>
                        <input type="checkbox" onchange="saveData('${key}', this.checked)" ${checked}>
                    </div>
                `;
            });
            container.appendChild(card);
        });

        function saveData(key, val) {
            trackerData[key] = val;
            localStorage.setItem('gate_ee_data', JSON.stringify(trackerData));
            updateCharts();
        }

        function addMock() {
            const name = document.getElementById('mockName').value;
            const score = document.getElementById('mockScore').value;
            if(!name || !score) return;
            
            mockData.push({name, score});
            localStorage.setItem('gate_mock_data', JSON.stringify(mockData));
            renderMocks();
            updateCharts();
        }

        function renderMocks() {
            const body = document.getElementById('mockBody');
            body.innerHTML = mockData.map(m => `<tr><td>${m.name}</td><td>${m.score}</td></tr>`).join('');
        }

        // --- CHARTS ---
        let progChart, scoreChart;

        function updateCharts() {
            const totalTasks = subjects.length * taskTypes.length;
            const completed = Object.values(trackerData).filter(v => v === true).length;
            const remaining = totalTasks - completed;

            if(progChart) progChart.destroy();
            progChart = new Chart(document.getElementById('progressChart'), {
                type: 'doughnut',
                data: {
                    labels: ['Done', 'Left'],
                    datasets: [{
                        data: [completed, remaining],
                        backgroundColor: ['#238636', '#30363d']
                    }]
                },
                options: { plugins: { legend: { labels: { color: 'white' } } } }
            });

            if(scoreChart) scoreChart.destroy();
            scoreChart = new Chart(document.getElementById('mockChart'), {
                type: 'line',
                data: {
                    labels: mockData.map(m => m.name),
                    datasets: [{
                        label: 'Score / 100',
                        data: mockData.map(m => m.score),
                        borderColor: '#58a6ff',
                        tension: 0.1
                    }]
                },
                options: { scales: { y: { beginAtZero: true, grid: {color: '#30363d'}, ticks: {color: 'white'} }, x: {ticks: {color: 'white'}}} }
            });
        }

        // Random Quotes
        const quotes = [
            "Ajeet, focus on the fundamentals.",
            "Rank 1 is built one PYQ at a time.",
            "Machines and Power Systems are the heavy hitters. Stay sharp.",
            "Consistency > Intensity."
        ];
        document.getElementById('quote').innerText = `"${quotes[Math.floor(Math.random()*quotes.length)]}"`;

        renderMocks();
        updateCharts();
    </script>
</body>
</html>
