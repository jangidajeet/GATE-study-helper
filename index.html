<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AJEET ELITE</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #020617; --card: #1e293b; --accent: #0ea5e9; --text: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        .branding { font-size: 28px; font-weight: 800; color: var(--accent); text-align: center; margin-top: 10px; }
        .card { background: var(--card); padding: 20px; border-radius: 20px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1); }
        h2 { font-size: 16px; margin: 0 0 15px 0; border-left: 4px solid var(--accent); padding-left: 10px; }
        
        /* Subject List */
        .subject-grid { display: grid; gap: 8px; margin-bottom: 15px; }
        .subject-row { display: flex; justify-content: space-between; background: #0f172a; padding: 12px; border-radius: 10px; align-items: center; }
        .chk { width: 22px; height: 22px; cursor: pointer; accent-color: var(--accent); }
        
        canvas { width: 100% !important; height: 200px !important; }
        .btn { background: var(--accent); border: none; padding: 12px; border-radius: 10px; color: white; font-weight: bold; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="branding">AJIT ELITE EE 2026</div>
    <p style="text-align: center; font-size: 12px; opacity: 0.6;">"Hard work beats talent when talent doesn't work hard." ⚡</p>

    <div class="card">
        <h2>Subject Progress (Bar Chart)</h2>
        <canvas id="barChart"></canvas>
    </div>

    <div class="card">
        <h2>EE Core Subjects</h2>
        <div class="subject-grid" id="subjectGrid">
            </div>
    </div>

    <div class="card">
        <h2>Mock Performance (Line Diagram)</h2>
        <canvas id="lineChart"></canvas>
        <div style="display:flex; gap:5px; margin-top:10px;">
            <input type="number" id="scoreInput" placeholder="Enter Score" style="flex:1; padding:10px; border-radius:8px; border:none;">
            <button onclick="addMock()" style="padding:10px 20px; background:var(--accent); border:none; border-radius:8px; color:white; font-weight:bold;">LOG</button>
        </div>
    </div>

    <script>
        const subs = ["Circuits", "Machines", "Power Sys", "Signals", "Control", "EMF", "Analog", "Maths"];
        let status = [0, 0, 0, 0, 0, 0, 0, 0];
        let mockScores = [0];

        // Load Subject Details
        const grid = document.getElementById('subjectGrid');
        subs.forEach((s, i) => {
            grid.innerHTML += `
                <div class="subject-row">
                    <span>${s}</span>
                    <input type="checkbox" class="chk" onchange="toggleSub(${i})">
                </div>`;
        });

        // Initialize Bar Chart
        const barCtx = document.getElementById('barChart').getContext('2d');
        const bChart = new Chart(barCtx, {
            type: 'bar',
            data: { labels: subs, datasets: [{ label: 'Completed', data: status, backgroundColor: '#0ea5e9' }] },
            options: { scales: { y: { max: 1, ticks: { display: false } } }, plugins: { legend: { display: false } } }
        });

        // Initialize Line Diagram
        const lineCtx = document.getElementById('lineChart').getContext('2d');
        const lChart = new Chart(lineCtx, {
            type: 'line',
            data: { labels: ['Start'], datasets: [{ label: 'Score', data: mockScores, borderColor: '#0ea5e9', tension: 0.4 }] },
            options: { plugins: { legend: { display: false } } }
        });

        function toggleSub(i) {
            status[i] = status[i] === 0 ? 1 : 0;
            bChart.data.datasets[0].data = status;
            bChart.update();
        }

        function addMock() {
            const val = document.getElementById('scoreInput').value;
            if(!val) return;
            mockScores.push(Number(val));
            lChart.data.labels.push('T' + (mockScores.length - 1));
            lChart.update();
            document.getElementById('scoreInput').value = "";
        }
    </script>
</body>
</html>
