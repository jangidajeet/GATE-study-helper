<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GATE EE Iterative Tracker - Ajeet</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --text-color: #c9d1d9;
            --accent-color: #58a6ff;
            --border-color: #30363d;
            --success: #238636;
            --reset: #da3633;
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-color); color: var(--text-color); margin: 0; padding: 20px; }

        /* Ajeet Branding Watermarks */
        .watermark { position: fixed; font-weight: 900; font-size: 1.2rem; color: rgba(255, 255, 255, 0.05); z-index: 1000; pointer-events: none; }
        .top-left { top: 10px; left: 10px; } .top-right { top: 10px; right: 10px; }
        .bottom-left { bottom: 10px; left: 10px; } .bottom-right { bottom: 10px; right: 10px; }

        .container { max-width: 1100px; margin: 0 auto; }
        h1 { color: var(--accent-color); text-align: center; text-transform: uppercase; letter-spacing: 2px; }

        .quote-box { background: var(--card-bg); border-left: 5px solid var(--accent-color); padding: 15px; margin: 20px 0; text-align: center; font-style: italic; }

        /* Grid Layout */
        .subjects-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        
        .subject-card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 18px; transition: 0.3s; }
        .subject-card:hover { border-color: var(--accent-color); }
        .subject-card h3 { margin-top: 0; color: #f0f6fc; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; font-size: 1.1rem; }

        /* Counter Styling */
        .task-row { display: flex; align-items: center; justify-content: space-between; margin: 12px 0; background: #0d1117; padding: 8px; border-radius: 6px; }
        .task-label { font-weight: 500; font-size: 0.9rem; }
        
        .counter-controls { display: flex; align-items: center; gap: 10px; }
        .count-display { background: var(--accent-color); color: #000; font-weight: bold; min-width: 25px; text-align: center; border-radius: 4px; padding: 2px 6px; }
        
        .btn-add { background: var(--success); color: white; border: none; border-radius: 4px; cursor: pointer; padding: 5px 10px; font-weight: bold; }
        .btn-add:active { transform: scale(0.9); }
        .btn-reset { background: transparent; color: var(--reset); border: 1px solid var(--reset); font-size: 0.7rem; cursor: pointer; border-radius: 3px; }

        /* Mocks */
        .mock-section { background: var(--card-bg); padding: 25px; border-radius: 12px; margin-top: 40px; border: 1px solid var(--border-color); }
        input, select, button { padding: 10px; background: #0d1117; border: 1px solid var(--border-color); color: white; border-radius: 4px; }
        .log-btn { background: var(--accent-color); color: black; font-weight: bold; border: none; padding: 10px 20px; cursor: pointer; }
        table { width: 100%; margin-top: 20px; border-collapse: collapse; }
        th, td { padding: 12px; border: 1px solid var(--border-color); text-align: center; }
    </style>
</head>
<body>

    <div class="watermark top-left">AJEET</div><div class="watermark top-right">AJEET</div>
    <div class="watermark bottom-left">AJEET</div><div class="watermark bottom-right">AJEET</div>

    <div class="container">
        <h1>⚡ Ajeet's GATE EE Tracker</h1>
        <div class="quote-box" id="quote">"Consistency turns talent into rank."</div>

        <div class="subjects-grid" id="syllabus-container"></div>

        <div class="mock-section">
            <h2>📈 Mock Test Performance</h2>
            <div style="max-width: 600px; margin: 0 auto 20px;">
                <canvas id="mockChart"></canvas>
            </div>
            <div style="display:flex; gap:10px; justify-content: center; flex-wrap: wrap;">
                <input type="text" id="mockName" placeholder="Test Name">
                <input type="number" id="mockScore" placeholder="Marks / 100">
                <button class="log-btn" onclick="addMock()">Log Result</button>
            </div>
            <table id="mockTable">
                <thead><tr><th>Test</th><th>Score</th><th>Action</th></tr></thead>
                <tbody id="mockBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        const subjects = [
            "Network Analysis", "Analog Network", "Digital Network", 
            "Power System", "Power Electronics", "Control System", 
            "Electrical Machines", "Measurement & Instrumentation", 
            "Electromagnetic Theory", "Engineering Mathematics", 
            "General Aptitude", "Signal and System"
        ];
        const taskTypes = ["Notes", "DPP", "PYQs", "Revision"];

        // Initialize Data
        let trackerData = JSON.parse(localStorage.getItem('ajeet_gate_v2')) || {};
        let mockData = JSON.parse(localStorage.getItem('ajeet_mocks_v2')) || [];

        const container = document.getElementById('syllabus-container');

        // Render Cards
        subjects.forEach(sub => {
            const card = document.createElement('div');
            card.className = 'subject-card';
            card.innerHTML = `<h3>${sub}</h3>`;
            
            taskTypes.forEach(task => {
                const key = `${sub}-${task}`;
                const count = trackerData[key] || 0;
                
                const row = document.createElement('div');
                row.className = 'task-row';
                row.innerHTML = `
                    <span class="task-label">${task}</span>
                    <div class="counter-controls">
                        <button class="btn-reset" onclick="updateCount('${key}', 0)">R</button>
                        <span class="count-display" id="cnt-${key}">${count}</span>
                        <button class="btn-add" onclick="updateCount('${key}', 1)">+</button>
                    </div>
                `;
                card.appendChild(row);
            });
            container.appendChild(card);
        });

        function updateCount(key, amount) {
            if(amount === 0) trackerData[key] = 0;
            else trackerData[key] = (trackerData[key] || 0) + 1;
            
            localStorage.setItem('ajeet_gate_v2', JSON.stringify(trackerData));
            document.getElementById(`cnt-${key}`).innerText = trackerData[key];
        }

        function addMock() {
            const name = document.getElementById('mockName').value;
            const score = document.getElementById('mockScore').value;
            if(!name || !score) return;
            mockData.push({ name, score: parseFloat(score) });
            localStorage.setItem('ajeet_mocks_v2', JSON.stringify(mockData));
            renderMocks();
            updateChart();
        }

        function deleteMock(index) {
            mockData.splice(index, 1);
            localStorage.setItem('ajeet_mocks_v2', JSON.stringify(mockData));
            renderMocks();
            updateChart();
        }

        function renderMocks() {
            const body = document.getElementById('mockBody');
            body.innerHTML = mockData.map((m, i) => `
                <tr>
                    <td>${m.name}</td>
                    <td style="color:#58a6ff; font-weight:bold;">${m.score}</td>
                    <td><button class="btn-reset" onclick="deleteMock(${i})">Delete</button></td>
                </tr>
            `).join('');
        }

        let chartInstance;
        function updateChart() {
            const ctx = document.getElementById('mockChart').getContext('2d');
            if(chartInstance) chartInstance.destroy();
            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: mockData.map(m => m.name),
                    datasets: [{
                        label: 'Marks out of 100',
                        data: mockData.map(m => m.score),
                        borderColor: '#58a6ff',
                        backgroundColor: 'rgba(88, 166, 255, 0.1)',
                        fill: true,
                        tension: 0.3
                    }]
                },
                options: {
                    scales: {
                        y: { beginAtZero: true, max: 100, grid: { color: '#30363d' }, ticks: { color: '#c9d1d9' } },
                        x: { grid: { color: '#30363d' }, ticks: { color: '#c9d1d9' } }
                    },
                    plugins: { legend: { labels: { color: '#c9d1d9' } } }
                }
            });
        }

        renderMocks();
        updateChart();
    </script>
</body>
</html>
